name: Wavey
options:
  bundleIdPrefix: com.zaftco
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
packages:
  WaveyEngine:
    path: Engine
settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: DCPE232A7E
    ENABLE_DEBUG_DYLIB: "NO"
targets:
  Wavey:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - App
    dependencies:
      - package: WaveyEngine
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
        PRODUCT_BUNDLE_IDENTIFIER: com.zaftco.wavey
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Wavey listens to your guitar through the microphone to tune it and follow along as you play."
schemes:
  Wavey:
    build:
      targets:
        Wavey: all
    run:
      config: Debug
      debugEnabled: false   # keep "Debug executable" unchecked across regenerations
