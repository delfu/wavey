name: Wavey
options:
  bundleIdPrefix: com.delongfu
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
packages:
  WaveyEngine:
    path: Engine
targets:
  Wavey:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - App
    dependencies:
      - package: WaveyEngine
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
        PRODUCT_BUNDLE_IDENTIFIER: com.delongfu.wavey
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
schemes:
  Wavey:
    build:
      targets:
        Wavey: all
    run:
      config: Debug
